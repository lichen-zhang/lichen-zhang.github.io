name = "xhs-writer-api"
main = "worker.ts"
compatibility_date = "2026-03-12"

[[d1_databases]]
binding = "DB"
database_name = "xhs-writer-db"
database_id = "replace-with-your-d1-database-id"

[vars]
ALLOWED_ORIGINS = "https://stackout.work,https://www.stackout.work,https://lichen-zhang-github-io.pages.dev"
EMAIL_AUTH_BASE_URL = "https://mail.stackout.work"
EMAIL_AUTH_MAX_ATTEMPTS = "3"
EMAIL_AUTH_TIMEOUT_MS = "5000"
EMAIL_AUTH_RETRY_BASE_DELAY_MS = "150"
EMAIL_AUTH_CIRCUIT_FAILURE_THRESHOLD = "5"
EMAIL_AUTH_CIRCUIT_OPEN_MS = "30000"
EXPOSE_DEV_CODE = "false"
BIZ_API_BASE_URL = "https://biz.stackout.work"
AI_GATEWAY_BASE_URL = "https://api.stackout.work"
AI_GATEWAY_API_KEY = ""
KIMI_API_URL = "https://api.moonshot.cn/v1/chat/completions"
KIMI_MODEL = "moonshot-v1-8k"
